{% extends "base.html" %}

{% block title %}Upload · Ephemera{% endblock %}

{% block content %}
<section class="form-card">
    <h1>Upload to Ephemera</h1>
    <p class="form-help">
        Images and short videos are welcome. Uploads are marked for approval before appearing in the main gallery.
    </p>

    <form method="POST" enctype="multipart/form-data" class="form-grid">
        <div class="form-row">
            <label for="image">File</label>
            <input
                id="image"
                type="file"
                name="image"
                accept=".jpg,.jpeg,.png,.webp,.gif,.mp4,.webm"
                required
            >
        </div>

        <div class="form-row">
            <label for="caption">Caption</label>
            <input
                id="caption"
                type="text"
                name="caption"
                maxlength="200"
                placeholder="optional caption"
            >
        </div>

        <div class="form-actions">
            <button type="submit" class="button button-primary">Upload</button>
            <a class="nav-link" href="{{ url_for('gallery') }}">Back to gallery</a>
        </div>
    </form>
</section>
{% endblock %}
