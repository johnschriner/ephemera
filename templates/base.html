<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Ephemera{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div>
                <a class="brand" href="{{ url_for('gallery') }}">Ephemera</a>
            </div>
            <nav class="site-nav">
                <a class="nav-link" href="{{ url_for('gallery') }}">Gallery</a>
                <a class="nav-link nav-cta" href="{{ url_for('upload') }}">Upload</a>
                {% if session.get('admin') %}
                <nav>
                    <a href="{{ url_for('admin_dashboard') }}">Admin</a>
                    <a href="{{ url_for('admin_logout') }}">Logout</a>
                </nav>
                {% endif %}
            </nav>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-stack">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
<footer class="footer">
    <a href="{{ url_for('terms') }}">Terms</a>
</footer>
</body>
</html>
